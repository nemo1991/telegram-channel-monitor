name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      # 拉源码 — shallow clone 已够(测试只读 HEAD 状态)
      - uses: actions/checkout@v4

      # Python ${{ matrix.python-version }} — actions/setup-python 是官方 v5,
      # 直接装到 PATH,后面的 `python -m pip` 走它(无 uv 依赖以减小 surface)
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Ubuntu 上 Qt6 offscreen QPA 需要 libEGL / libGL / libxkbcommon / libfontconfig / libsm / libice 等
      # 缺一 import QtWidgets 就 ImportError;macOS 自带 / 已 brew 装好,跳过
      - name: Install Qt system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xkb1 libxkbcommon-x11-0 \
            libxcb-randr0 libxcb-render-util0 libxcb-render0 \
            libxcb-icccm4 libxcb-image0 libxcb-util1 \
            libsm6 libice6
          # Qt offscreen QPA 还需要 libegl;装完后 ldconfig
          sudo ldconfig

      # pip 缓存以 pyproject + 锁文件 hash 为 key(锁文件变 → 缓存失效)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      # 装全部依赖 + 测试 + aiotdlib(以保证 import 链通)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 装全部依赖 + 测试 + aiotdlib(以保证 import 链通)
          python -m pip install -e ".[all,postgres,mongo,objectstore]"
          python -m pip install pytest pytest-asyncio ruff coverage

      # 仅 sanity check 入口注册;fake client 缺凭据时启动会卡在 QR,`|| true` 让
      # CI 不因 fake 模式失败(exit 124 / KeyboardInterrupt 都吞)
      - name: Verify CLI entry
        run: |
          python -m tgmonitor --help || true
        shell: bash

      - name: Run pytest
        env:
          PYTHONPATH: src
          # 强制 Qt 用 offscreen 后端(无显示器),PySide6 在 CI 必设,否则
          # Linux 上 Qt 会尝试加载 libEGL.so.1 之类系统库;
          # 单元测试里 test_message_view.py / test_main_window_close.py
          # 也已 setdefault,但 ENV 在进程启动前定最稳。
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: "*.warning=false"
        run: |
          # -v 看每个 case 名;--tb=short 失败时压栈长度可控;不传 --cov 给默认 pytest
          # 跑路径(下面 coverage step 单独收集,矩阵设阈门会带来 churn,故只产 artifact)
          python -m pytest -v --tb=short

      # 再跑一次只为收集 branch coverage + 产 xml 报告(不设阈值门控)
      - name: Run pytest with coverage
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: "*.warning=false"
        run: |
          # 第二次跑只为了收集分支覆盖 + xml 报告(不产覆盖率门控);
          # coverage 在 pyproject [dependency-groups].dev 已列,装在前面 pip install 步骤
          python -m coverage run -m pytest -q
          python -m coverage xml -o coverage.xml

      # 以 OS + Python 版本为名,跨矩阵下不互相覆盖;若 coverage.xml
      # 不存在(说明 pytest 失败或根本没装 coverage),warn 不 fail
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          # 以 OS + Python 版本为名,跨矩阵下不互相覆盖
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      # lint 只跑 ruff,Python 版本 pin 3.12(版本间行为差异在 lint 规则里很小;
      # 走单 Python 节省 CI 资源)
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # 装 ruff 而非走 setup-python 的 pip cache —— lint job 没有 cache step,
      # 直接 pip install 避免引入额外 cache key 配置
      - run: python -m pip install ruff
      # 0 容忍:任何 E/F/I/B/UP/N/SIM/ASYNC 警告都让本 job 红,见 pyproject.toml
      # [tool.ruff.lint].select 配置
      - run: ruff check src tests
