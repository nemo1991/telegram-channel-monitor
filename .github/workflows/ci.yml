name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        # windows-latest 不在 matrix — upstream aiotdlib 0.27.x 不发布
        # Windows wheel,uv sync 在 Windows 会触发 TDLib sdist 编译,
        # 需 MSVC + OpenSSL + gperf + PHP,windows-latest runner 没装,
        # 必失败。源码层跨平台(全 pathlib / 无 POSIX-only 假设),但
        # 不在 CI 验证 — 见 README"Platform Support"
        os: [ubuntu-latest, macos-latest]

    steps:
      # 拉源码 — shallow clone 已够(测试只读 HEAD 状态)
      - uses: actions/checkout@v7

      # 一站式装 uv + Python + 缓存驱动:`uv sync` 靠 `cache-dependency-glob`
      # 自动监控 uv.lock 变化,lock 变 → 失效;不走 actions/cache@v4,
      # 跨平台 cache path 自动(Library/Caches/uv / ~/.cache/uv / %LOCALAPPDATA%\uv)
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Ubuntu 上 Qt6 offscreen QPA 需要 libEGL / libGL / libxkbcommon / libfontconfig / libsm / libice 等
      # 缺一 import QtWidgets 就 ImportError;macOS 自带 / 已 brew 装好。
      # libc++-dev 给 aiotdlib 的 bundled TDLib .so 提供 libc++.so.1
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xkb1 libxkbcommon-x11-0 \
            libxcb-randr0 libxcb-render-util0 libxcb-render0 \
            libxcb-icccm4 libxcb-image0 libxcb-util1 \
            libsm6 libice6 \
            libc++-dev
          # Qt offscreen QPA 还需要 libegl;装完后 ldconfig
          sudo ldconfig

      # uv sync 一次性装:
      #   - [project.dependencies] (PySide6 / qasync / aiotdlib / pydantic-settings / Jinja2)
      #   - [project.optional-dependencies] 全部 (postgres/mongo/objectstore)
      #   - [dependency-groups].dev (pytest / pytest-asyncio / ruff / coverage)
      # `-q` 关 progress bar,CI 日志干净
      - name: Install dependencies
        run: uv sync --all-extras --group dev -q

      # 仅 sanity check 入口注册;fake client 缺凭据时启动会卡在 QR,
      # `|| true` 让 CI 不因 fake 模式失败(exit 124 / KeyboardInterrupt 都吞)
      - name: Verify CLI entry
        run: uv run tgmonitor --help || true
        shell: bash

      - name: Run pytest
        env:
          PYTHONPATH: src
          # 强制 Qt 用 offscreen 后端(无显示器),PySide6 在 CI 必设,否则
          # Linux 上 Qt 会尝试加载 libEGL.so.1 之类系统库;
          # 单元测试里 conftest 已 setdefault,但 ENV 在进程启动前定最稳
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: "*.warning=false"
        run: |
          # -v 看每个 case 名;--tb=short 失败时压栈长度可控;
          # `uv run` 自动激活 venv(PYTHONPATH 也透传),装好的 editable 项目
          # 在 .venv 里直接可用,无需 python -m pip install -e 再来一次
          uv run python -m pytest -v --tb=short

      # 再跑一次只为收集 branch coverage + 产 xml 报告(不设阈值门控)
      - name: Run pytest with coverage
        env:
          PYTHONPATH: src
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: "*.warning=false"
        run: |
          # coverage 已经在 --group dev 里装好;`uv run` 注入 PATH
          uv run coverage run -m pytest -q
          uv run coverage xml -o coverage.xml

      # 以 OS + Python 版本为名,跨矩阵下不互相覆盖;若 coverage.xml
      # 不存在(说明 pytest 失败或根本没装 coverage),warn 不 fail
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          # 以 OS + Python 版本为名,跨矩阵下不互相覆盖
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      # lint 单独 job:不走 .venv 也行,`uv tool run ruff` 直接拉 ruff 到临时 env
      # 跑 ruff,免一次完整 uv sync(只装 ruff 即可,~10MB)
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # 0 容忍:任何 E/F/I/B/UP/N/SIM/ASYNC 警告都让本 job 红,见 pyproject.toml
      # [tool.ruff.lint].select 配置。`uv tool run` 临时拉 ruff(~10MB)不污染
      # 主 venv — lint 不需要 PySide6 等 700MB+ 的大包
      - name: Run ruff
        run: uv tool run --from "ruff>=0.5" ruff check src tests
